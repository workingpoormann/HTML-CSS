<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexbox</title>
    <style>
    .el--1 {
      background-color: blueviolet;
    }

    .el--2 {
      background-color: orangered;
    }
    .el--3 {
      background-color: green;
      height: 150px;
    }
    .el--4 {
      background-color: goldenrod;
    }
    .el--5 {
      background-color: palevioletred;
    }
    .el--6 {
      background-color: steelblue;
    }
    .el--7 {
      background-color: yellow;
    }
    .el--8 {
      background-color: crimson;
    }

    .common {
      font-family: sans-serif;
      background-color: #ddd;
      font-size: 30px;
      margin: 40px;
    }

    .container1 {
      display: flex;
    }

    .container2 {
      display: flex;
      /* center stretch flex-start flex-end */
      align-items: center;
      /* center space-between space-around space-evenly */
      justify-content: flex-start;

      gap: 10px;
    }

    .container2 .el {
      /* flex-grow: 0; */
      /* flex-shrink: 1; コンテナに十分な幅がない場合は shrink してOK */
      /* flex-basis: auto; */
      /* flex-shrink: 0; */
      /* flex-grow: 1; */

      /* grow shrink basis */
      flex: 1 1 200px;
    }

    .container2 .el--1 {
      align-self: flex-start;
      flex-grow: 2;
    }

    .container2 .el--2 {
      align-self: stretch;
    }
    </style>
  </head>

  <body>
    <div class="common container1">
      <div class="el el--1">HTML</div>
      <div class="el el--2">and</div>
      <div class="el el--3">CSS</div>
      <div class="el el--4">are</div>
      <div class="el el--5">amazing</div>
      <div class="el el--6">languages</div>
      <div class="el el--7">to</div>
      <div class="el el--8">learn</div>
    </div>

    <div class="common container2">
      <div class="el el--1">Hello</div>
      <div class="el el--2">,</div>
      <div class="el el--3">World</div>
      <div class="el el--4">:D</div>

      <div class="el el--5">Goodbye</div>
      <div class="el el--6">,</div>
      <div class="el el--7">World</div>
      <div class="el el--8">D:</div>
    </div>
  </body>
</html>
