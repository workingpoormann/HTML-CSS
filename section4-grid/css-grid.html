<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8">
		<meta http-equiv="X-UA-Compatible" content="IE=edge">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<title>CSS Grid</title>
		<style>
		.el {
			text-align: center;
		}
		.el--1 {
			background-color: blueviolet;
		}
		.el--2 {
			background-color: orangered;
		}
		.el--3 {
			background-color: green;
			/*
        高さは grid-template-rowsを指定しないと こいつ依存
      */
			height: 150px;
		}
		.el--4 {
			background-color: goldenrod;
		}
		.el--5 {
			background-color: palevioletred;
		}
		.el--6 {
			background-color: steelblue;
		}
		.el--7 {
			background-color: yellow;
		}
		.el--8 {
			background-color: crimson;
		}

		.container--1 {
			/* STARTER */
			font-family: sans-serif;
			background-color: #ddd;
			font-size: 32px;
			margin: 20px;

			/* CSS GRID */
			display: grid;
			grid-template-columns: 200px 200px 100px 100px;
			grid-template-rows: 200px 100px;
			/* grid-gap でも可 */
			/* gap: 20px; */
			column-gap: 10px;
			row-gap: 50px;
		}

		.container--2 {
			/* STARTER */
			font-family: sans-serif;
			background-color: black;
			font-size: 60px;
			margin: 20px;

			/* CSS GRID */
			display: grid;
			/* fr = fraction
      余ったスペースを指定した割合で埋める */
			/* auto: 埋める */
			/* grid-template-columns: 2fr 1fr 3fr auto; */
			grid-template-columns: repeat(3, 1fr); /* = 1fr 1fr 1fr 1fr */
			/* grid-template-rows: 200px 200px; */
			/* fr: Rowでも使える Heightを設定する必要あり */
			/* grid-template-rows: 1fr 1fr; */
			grid-template-rows: 1fr auto;
			height: 350px;

			column-gap: 20px;
			row-gap: 20px;
		}

		.container--3 {
			/* STARTER */
			font-family: sans-serif;
			background-color: black;
			font-size: 20px;
			margin: 20px;

			width: 1000px;
			height: 600px;

			/* CSS GRID */
			display: none;
		}
		</style>
	</head>
	<body>
		<div class="container--1">
			<div class="el el--1">(1) HTML</div>
			<div class="el el--2">(2) and</div>
			<div class="el el--3">(3) CSS</div>
			<div class="el el--4">(4) are</div>
			<div class="el el--5">(5) amazing</div>
			<div class="el el--6">(6) languages</div>
			<div class="el el--7">(7) to</div>
			<div class="el el--8">(8) learn</div>
		</div>

		<div class="container--2">
			<div class="el el--1">1</div>
			<div class="el el--3">2</div>
			<div class="el el--4">3</div>
			<div class="el el--5">4</div>
			<div class="el el--6">5</div>
			<div class="el el--7">6</div>
		</div>

		<div class="container--3">
			<div class="el el--1">(1)</div>
			<div class="el el--3">(3)</div>
			<div class="el el--4">(4)</div>
			<div class="el el--5">(5)</div>
			<div class="el el--6">(6)</div>
			<div class="el el--7">(7)</div>
		</div>
	</body>
</html>
