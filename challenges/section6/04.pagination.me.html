<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<link
			rel="stylesheet"
			href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap"
		>
		<link rel="stylesheet" href="04.pagination.me.css">
		<title>Document</title>
	</head>

	<body>
		<div class="pagination">
			<button type="button" class="btn btn--left">
				<svg
					xmlns="http://www.w3.org/2000/svg"
					fill="none"
					viewBox="0 0 24 24"
					stroke-width="1.5"
					stroke="currentColor"
					class="btn-icon"
				>
					<title>chevron left</title>
					<path
						stroke-linecap="round"
						stroke-linejoin="round"
						d="M15.75 19.5 8.25 12l7.5-7.5"
					/>
				</svg>
			</button>
			<button type="button" class="btn">1</button>
			<button type="button" class="btn">2</button>
			<button type="button" class="btn btn-active">3</button>
			<button type="button" class="btn">4</button>
			<button type="button" class="btn">5</button>
			<button type="button" class="btn">6</button>
			<button type="button" class="btn">...</button>
			<button type="button" class="btn">23</button>
			<button type="button" class="btn btn--right">
				<svg
					xmlns="http://www.w3.org/2000/svg"
					fill="none"
					viewBox="0 0 24 24"
					stroke-width="1.5"
					stroke="currentColor"
					class="btn-icon"
				>
					<title>chevron right</title>
					<path
						stroke-linecap="round"
						stroke-linejoin="round"
						d="m8.25 4.5 7.5 7.5-7.5 7.5"
					/>
				</svg>
			</button>
		</div>
	</body>
</html>
