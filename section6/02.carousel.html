<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<link
			rel="stylesheet"
			href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap"
		>
		<link rel="stylesheet" href="02.carousel.css">
		<title>Carousel Component</title>
	</head>

	<body>
		<div class="carousel">
			<img src="maria.jpg" alt="maria de Almeida">

			<blockquote>
				<p class="testimonial-text">
					"Lorem ipsum dolor, sit amet consectetur adipisicing elit. Ad, saepe
					reiciendis illum debitis nulla, quod voluptatum temporibus, ducimus
					suscipit in vitae"
				</p>

				<p class="testimonial-author">Maria de Almeida</p>
				<p class="testimonial-job">Senior Product Manager at EDP Comercial</p>
			</blockquote>

			<button type="button" class="btn btn--left">
				<svg
					xmlns="http://www.w3.org/2000/svg"
					fill="none"
					viewBox="0 0 24 24"
					stroke-width="1.5"
					stroke="currentColor"
					class="btn-icon"
				>
					<title>chevron left</title>
					<path
						stroke-linecap="round"
						stroke-linejoin="round"
						d="M15.75 19.5 8.25 12l7.5-7.5"
					/>
				</svg>
			</button>

			<button type="button" class="btn btn--right">
				<svg
					xmlns="http://www.w3.org/2000/svg"
					fill="none"
					viewBox="0 0 24 24"
					stroke-width="1.5"
					stroke="currentColor"
					class="btn-icon"
				>
					<title>chevron right</title>
					<path
						stroke-linecap="round"
						stroke-linejoin="round"
						d="m8.25 4.5 7.5 7.5-7.5 7.5"
					/>
				</svg>
			</button>

			<div class="dots">
				<button type="button" class="dot dot--fill">&nbsp;</button>
				<button type="button" class="dot">&nbsp;</button>
				<button type="button" class="dot">&nbsp;</button>
				<button type="button" class="dot">&nbsp;</button>
			</div>
		</div>
	</body>
</html>
